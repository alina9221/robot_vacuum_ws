usb_cam_node:
  ros__parameters:
    video_device: "/dev/video0"      # или "/dev/v4l/by-id/..."
    framerate: 30.0
    pixel_format: "mjpeg2rgb"        # или "yuyv"
    image_width: 640
    image_height: 480
    camera_name: "camera1"
    camera_info_url: "package://robot_vacuum/config/camera_info.yaml"
    brightness: 0
    contrast: 32
    saturation: 32
    sharpness: 22
